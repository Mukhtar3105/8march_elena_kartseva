<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>8 Марта — Карцева Елена Сергеевна</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Great+Vibes&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:"Cormorant Garamond",serif;
background:white;
color:#1a1a1a;
}

.wrap{
max-width:720px;
margin:auto;
padding:30px 20px 80px;
}

.hero{
text-align:center;
}

.hero img.logo{
width:200px;
margin-bottom:10px;
}

.hero-img{
width:260px;
height:260px;
margin:auto;
border-radius:50%;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.hero-img img{
width:100%;
height:100%;
object-fit:cover;
object-position:50% 25%;
}

h1{
font-family:"Great Vibes",cursive;
font-size:48px;
margin:20px 0;
color:#b58f98;
}

.btn{
display:inline-block;
padding:12px 22px;
border-radius:30px;
background:#c6a1a8;
color:white;
text-decoration:none;
font-family:"Cinzel",serif;
font-size:13px;
margin-top:20px;
}

.card{
background:#ffffff;
padding:25px;
border-radius:22px;
margin-top:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
text-align:center;
}

.p{
font-size:20px;
line-height:1.7;
}

.gallery{
margin-top:20px;
border-radius:20px;
overflow:hidden;
background:#f9f9f9;
}

.g-stage{
position:relative;
width:100%;
aspect-ratio:9/16;
max-height:75vh;
overflow:hidden;
}

.g-stage img{
position:absolute;
inset:0;
width:100%;
height:100%;
opacity:0;
transition:.3s;
}

.g-stage img.active{
opacity:1;
}

.g-stage.contain img{
object-fit:contain;
}

.g-stage.cover img{
object-fit:cover;
}

.g-controls{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
}

.g-controls button{
padding:10px 16px;
border:none;
background:#c6a1a8;
color:white;
border-radius:20px;
font-family:"Cinzel",serif;
cursor:pointer;
}

.dots{
display:flex;
gap:6px;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:#ccc;
cursor:pointer;
}

.dot.on{
background:#b58f98;
}

</style>
</head>

<body>

<div class="wrap">

<div class="hero">

<img class="logo" src="./GEN_Wing_positive(filled)_RGB_low%20(1).png">

<h1>С 8 Марта</h1>

<div class="hero-img">
<img src="./main_photo.png?v=2">
</div>

</div>


<div class="card">

<p class="p">
Елена Сергеевна, примите самые тёплые поздравления с Международным женским днём!
</p>

</div>


<div class="card">

<h2>Галерея</h2>

<div class="gallery">

<div class="g-stage contain" id="gStage">

<img src="./1_photo.png" class="active">
<img src="./2_photo.png">
<img src="./3_photo.png">
<img src="./4_photo.png">
<img src="./5_photo.png">

</div>

<div class="g-controls">

<button id="gPrev">Назад</button>

<div class="dots" id="gDots"></div>

<button id="gNext">Вперёд</button>

<button id="gMode">Без обрезки</button>

</div>

</div>

</div>

</div>


<script>

const stage=document.getElementById("gStage")
const imgs=[...stage.querySelectorAll("img")]

const prev=document.getElementById("gPrev")
const next=document.getElementById("gNext")
const dotsWrap=document.getElementById("gDots")
const modeBtn=document.getElementById("gMode")

let i=0
let mode="contain"

function render(){

imgs.forEach((img,idx)=>{

img.classList.toggle("active",idx===i)

})

dotsWrap.querySelectorAll(".dot").forEach((d,idx)=>{

d.classList.toggle("on",idx===i)

})

}

function buildDots(){

dotsWrap.innerHTML=""

imgs.forEach((_,idx)=>{

const d=document.createElement("div")
d.className="dot"+(idx===i?" on":"")
d.onclick=()=>{

i=idx
render()

}

dotsWrap.appendChild(d)

})

}

prev.onclick=()=>{

i=(i-1+imgs.length)%imgs.length
render()

}

next.onclick=()=>{

i=(i+1)%imgs.length
render()

}

modeBtn.onclick=()=>{

if(mode==="contain"){

stage.classList.remove("contain")
stage.classList.add("cover")
mode="cover"
modeBtn.textContent="Заполнение"

}else{

stage.classList.remove("cover")
stage.classList.add("contain")
mode="contain"
modeBtn.textContent="Без обрезки"

}

}

buildDots()
render()

</script>

</body>
</html>
